services:
  db:
    image: postgres:16-alpine
    container_name: kuberone-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kuberone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kuberone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kuberone"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: kuberone-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/kuberone
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - kuberone-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kuberone-web
    ports:
      - "5173:5173"
    networks:
      - kuberone-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  kuberone-network:
    driver: bridge
